<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Text Reader</title>
<style>
  :root {
    --bg: #f7f7f5;
    --panel: #ffffff;
    --text: #1f1f1f;
    --muted: #6b6b6b;
    --accent: #2563eb;
    --border: #d9d9d6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 20px;
  }
  textarea {
    width: 100%;
    min-height: 200px;
    font-size: 1.05rem;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    resize: vertical;
  }
  .accent-choice {
    display: flex;
    gap: 20px;
    margin: 16px 0;
  }
  .accent-choice label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  button {
    font-size: 1rem;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
  button:disabled {
    background: #b9c6e6;
    cursor: not-allowed;
  }
  #status {
    margin-top: 14px;
    color: var(--muted);
    min-height: 1.2em;
  }
</style>
</head>
<body>
<main>
  <h1>English Text Reader</h1>
  <textarea id="text" placeholder="Paste English text here..."></textarea>

  <div class="accent-choice">
    <label><input type="radio" name="accent" value="british" checked> British English</label>
    <label><input type="radio" name="accent" value="american"> American English</label>
  </div>

  <div class="controls">
    <button id="playBtn" disabled>Play</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div id="status"></div>
</main>

<script>
  var PROXY_URL = 'https://REPLACE-WITH-YOUR-WORKER-URL.workers.dev';

  var textEl = document.getElementById('text');
  var playBtn = document.getElementById('playBtn');
  var pauseBtn = document.getElementById('pauseBtn');
  var stopBtn = document.getElementById('stopBtn');
  var statusEl = document.getElementById('status');
  var audioEl = new Audio();

  var appState = 'idle'; // 'idle' | 'loading' | 'playing' | 'paused'

  function base64ToBytes(base64) {
    var binary = atob(base64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }

  function parseSampleRate(mimeType) {
    var match = /rate=(\d+)/.exec(mimeType || '');
    return match ? parseInt(match[1], 10) : 24000;
  }

  function pcmBytesToWavBytes(pcmBytes, sampleRate) {
    var numChannels = 1;
    var bitsPerSample = 16;
    var byteRate = sampleRate * numChannels * (bitsPerSample / 8);
    var blockAlign = numChannels * (bitsPerSample / 8);
    var dataSize = pcmBytes.length;
    var buffer = new ArrayBuffer(44 + dataSize);
    var view = new DataView(buffer);

    function writeString(offset, str) {
      for (var i = 0; i < str.length; i++) {
        view.setUint8(offset + i, str.charCodeAt(i));
      }
    }

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(36, 'data');
    view.setUint32(40, dataSize, true);

    var wavBytes = new Uint8Array(buffer);
    wavBytes.set(pcmBytes, 44);
    return wavBytes;
  }

  function getSelectedAccent() {
    return document.querySelector('input[name="accent"]:checked').value;
  }

  function hasText() {
    return textEl.value.trim().length > 0;
  }

  function refreshButtons() {
    if (appState === 'loading') {
      playBtn.disabled = true;
      playBtn.textContent = 'Play';
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
    } else if (appState === 'playing') {
      playBtn.disabled = true;
      playBtn.textContent = 'Play';
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
    } else if (appState === 'paused') {
      playBtn.disabled = false;
      playBtn.textContent = 'Resume';
      pauseBtn.disabled = true;
      stopBtn.disabled = false;
    } else {
      playBtn.disabled = !hasText();
      playBtn.textContent = 'Play';
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
    }
  }

  textEl.addEventListener('input', refreshButtons);

  audioEl.addEventListener('ended', function () {
    appState = 'idle';
    statusEl.textContent = 'Zakończono.';
    refreshButtons();
  });

  playBtn.addEventListener('click', function () {
    if (appState === 'paused') {
      audioEl.play();
      appState = 'playing';
      statusEl.textContent = 'Czytanie...';
      refreshButtons();
      return;
    }

    var text = textEl.value.trim();
    if (!text) return;

    appState = 'loading';
    statusEl.textContent = 'Generowanie głosu...';
    refreshButtons();

    fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, accent: getSelectedAccent() }),
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        var pcmBytes = base64ToBytes(data.audioBase64);
        var sampleRate = parseSampleRate(data.mimeType);
        var wavBytes = pcmBytesToWavBytes(pcmBytes, sampleRate);
        var blob = new Blob([wavBytes], { type: 'audio/wav' });
        audioEl.src = URL.createObjectURL(blob);
        appState = 'playing';
        statusEl.textContent = 'Czytanie...';
        refreshButtons();
        audioEl.play();
      });
  });

  pauseBtn.addEventListener('click', function () {
    audioEl.pause();
    appState = 'paused';
    statusEl.textContent = 'Wstrzymano.';
    refreshButtons();
  });

  stopBtn.addEventListener('click', function () {
    audioEl.pause();
    audioEl.currentTime = 0;
    appState = 'idle';
    statusEl.textContent = '';
    refreshButtons();
  });

  refreshButtons();
</script>
</body>
</html>
